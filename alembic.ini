[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone-aware timestamps in migration filenames
# timezone = utc

[alembic:env]
# optional: sqlalchemy.url can be provided here, but we prefer DATABASE_URL env var

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S

# SQLAlchemy URL is read from env var DATABASE_URL by default
# Example override (not recommended for production):
# sqlalchemy.url = postgresql://user:pass@localhost:5432/yourdb
